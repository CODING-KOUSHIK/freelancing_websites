{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Reset Password — VoiceMarket</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}};</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/></head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex items-center justify-center px-4 antialiased">
  <div class="w-full max-w-md">
    <div class="text-center mb-8"><h1 class="text-3xl font-bold">Reset Password</h1><p class="text-gray-500 mt-1">We'll send an OTP to your email.</p></div>
    <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8">
      <div id="fp-msg" class="hidden mb-4 p-3 text-sm rounded-xl"></div>
      <div id="step-1">
        <input type="email" id="fp-email" placeholder="Your email" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:border-green-500 outline-none mb-4"/>
        <button onclick="sendResetOtp()" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white font-semibold py-3 rounded-xl">Send OTP</button>
      </div>
      <div id="step-2" class="hidden">
        <input type="text" id="fp-otp" placeholder="Enter OTP" maxlength="6" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm mb-3 focus:border-green-500 outline-none"/>
        <input type="password" id="fp-pass1" placeholder="New password" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm mb-3 focus:border-green-500 outline-none"/>
        <input type="password" id="fp-pass2" placeholder="Confirm password" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm mb-4 focus:border-green-500 outline-none"/>
        <button onclick="resetPassword()" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white font-semibold py-3 rounded-xl">Reset Password</button>
      </div>
    </div>
    <p class="text-center text-sm text-gray-500 mt-6"><a href="/login/" class="text-green-400">Back to Login</a></p>
  </div>
  <script>
    function showMsg(t,ok){const m=document.getElementById('fp-msg');m.textContent=t;m.className=`mb-4 p-3 text-sm rounded-xl ${ok?'bg-green-900/30 border border-green-700 text-green-300':'bg-red-900/30 border border-red-700 text-red-300'}`;m.classList.remove('hidden');}
    async function sendResetOtp(){try{const r=await fetch('/api/auth/password-reset/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('fp-email').value})});const d=await r.json();if(r.ok){showMsg('OTP sent! Check your email.',true);document.getElementById('step-1').classList.add('hidden');document.getElementById('step-2').classList.remove('hidden');}else showMsg(Object.values(d).flat().join(' '),false);}catch(e){showMsg('Network error.',false);}}
    async function resetPassword(){try{const r=await fetch('/api/auth/password-reset/confirm/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('fp-email').value,otp_code:document.getElementById('fp-otp').value,new_password:document.getElementById('fp-pass1').value,new_password2:document.getElementById('fp-pass2').value})});const d=await r.json();if(r.ok){showMsg('Password reset! Redirecting...',true);setTimeout(()=>window.location.href='/login/',1500);}else showMsg(Object.values(d).flat().join(' '),false);}catch(e){showMsg('Network error.',false);}}
  </script>
</body></html>
