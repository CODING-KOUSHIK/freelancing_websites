{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — VoiceMarket</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}};</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex items-center justify-center px-4 py-12 antialiased">
  <div class="w-full max-w-lg">
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2 mb-4">
        <div class="w-10 h-10 bg-gradient-to-br from-green-400 to-emerald-600 rounded-xl flex items-center justify-center">
          <i class="fas fa-microphone text-white"></i>
        </div>
        <span class="text-xl font-bold bg-gradient-to-r from-green-400 to-emerald-500 bg-clip-text text-transparent">VoiceMarket</span>
      </a>
      <h1 class="text-3xl font-bold">Create Your Account</h1>
      <p class="text-gray-500 mt-1">Start earning money with voice recordings</p>
    </div>

    <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8 shadow-xl">
      <div id="reg-error" class="hidden mb-4 p-3 bg-red-900/30 border border-red-700 text-red-300 text-sm rounded-xl"></div>
      <div id="reg-success" class="hidden mb-4 p-3 bg-green-900/30 border border-green-700 text-green-300 text-sm rounded-xl"></div>

      <form id="register-form" class="space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Full Name *</label>
            <input type="text" id="reg-name" required placeholder="John Doe"
              class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:border-green-500 outline-none transition-colors"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Gender</label>
            <select id="reg-gender" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:border-green-500 outline-none">
              <option value="">Select</option><option value="male">Male</option><option value="female">Female</option><option value="other">Other</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1">Email *</label>
          <input type="email" id="reg-email" required placeholder="you@email.com"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:border-green-500 outline-none transition-colors"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1">WhatsApp Number</label>
          <input type="tel" id="reg-whatsapp" placeholder="+91 9876543210"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:border-green-500 outline-none transition-colors"/>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Date of Birth</label>
            <input type="date" id="reg-dob" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:border-green-500 outline-none"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Country</label>
            <input type="text" id="reg-country" placeholder="India"
              class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:border-green-500 outline-none"/>
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Password *</label>
            <input type="password" id="reg-password" required placeholder="Min 8 chars"
              class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:border-green-500 outline-none"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Confirm Password *</label>
            <input type="password" id="reg-password2" required placeholder="Repeat"
              class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:border-green-500 outline-none"/>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1">Referral Code (optional)</label>
          <input type="text" id="reg-referral" placeholder="ABCD1234"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:border-green-500 outline-none"/>
        </div>
        <button type="submit" id="reg-btn"
          class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-semibold py-3 rounded-xl transition-all transform hover:scale-[1.02] shadow-lg shadow-green-900/30 mt-2">
          <i class="fas fa-user-plus mr-2"></i> Create Account
        </button>
      </form>
    </div>
    <p class="text-center text-gray-500 text-sm mt-6">Already have an account? <a href="/login/" class="text-green-400 hover:text-green-300 font-medium">Sign in</a></p>
  </div>

  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn=document.getElementById('reg-btn'), err=document.getElementById('reg-error'), suc=document.getElementById('reg-success');
      btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin mr-2"></i>Creating...';
      err.classList.add('hidden'); suc.classList.add('hidden');
      try {
        const res=await fetch('/api/auth/register/',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            email:document.getElementById('reg-email').value,
            full_name:document.getElementById('reg-name').value,
            password:document.getElementById('reg-password').value,
            password2:document.getElementById('reg-password2').value,
            gender:document.getElementById('reg-gender').value,
            whatsapp_number:document.getElementById('reg-whatsapp').value,
            date_of_birth:document.getElementById('reg-dob').value||null,
            country:document.getElementById('reg-country').value,
            referral_code_used:document.getElementById('reg-referral').value,
          })
        });
        const data=await res.json();
        if(res.ok){suc.textContent='Registration successful! Please check your email for OTP verification.';suc.classList.remove('hidden');
          setTimeout(()=>window.location.href='/verify-email/?email='+encodeURIComponent(document.getElementById('reg-email').value),2000);
        } else {err.textContent=Object.values(data).flat().join(' ')||'Registration failed.';err.classList.remove('hidden');}
      }catch(e){err.textContent='Network error.';err.classList.remove('hidden');}
      btn.disabled=false;btn.innerHTML='<i class="fas fa-user-plus mr-2"></i>Create Account';
    });
  </script>
</body>
</html>
