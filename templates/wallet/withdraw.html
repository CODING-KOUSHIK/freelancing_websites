{% extends "base.html" %}{% load static %}
{% block title %}Withdraw — VoiceMarket{% endblock %}
{% block content %}
<div class="animate-fade-in max-w-lg">
  <h1 class="text-2xl font-bold mb-6"><i class="fas fa-money-bill-wave mr-2 text-green-400"></i>Request Withdrawal</h1>
  <div class="card">
    <div id="wd-error" class="hidden mb-4 p-3 bg-red-900/30 border border-red-700 text-red-300 text-sm rounded-xl"></div>
    <div id="wd-success" class="hidden mb-4 p-3 bg-green-900/30 border border-green-700 text-green-300 text-sm rounded-xl"></div>
    <form id="wd-form" class="space-y-4">
      <div><label class="block text-sm text-gray-400 mb-1">Amount (₹) *</label>
        <input type="number" id="wd-amount" min="100" step="0.01" required class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:border-green-500 outline-none"/></div>
      <div><label class="block text-sm text-gray-400 mb-1">Method *</label>
        <select id="wd-method" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:border-green-500 outline-none">
          <option value="upi">UPI</option><option value="bank_transfer">Bank Transfer</option></select></div>
      <div id="upi-fields"><label class="block text-sm text-gray-400 mb-1">UPI ID</label>
        <input type="text" id="wd-upi" placeholder="username@upi" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:border-green-500 outline-none"/></div>
      <div id="bank-fields" class="hidden space-y-3">
        <input type="text" id="wd-bank" placeholder="Bank Name" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:border-green-500 outline-none"/>
        <input type="text" id="wd-acc" placeholder="Account Number" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:border-green-500 outline-none"/>
        <input type="text" id="wd-ifsc" placeholder="IFSC Code" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:border-green-500 outline-none"/>
        <input type="text" id="wd-holder" placeholder="Account Holder Name" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:border-green-500 outline-none"/>
      </div>
      <button type="submit" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white font-semibold py-3 rounded-xl shadow-lg shadow-green-900/30"><i class="fas fa-paper-plane mr-2"></i>Submit Request</button>
    </form>
  </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
  document.getElementById('wd-method').addEventListener('change',function(){document.getElementById('upi-fields').classList.toggle('hidden',this.value!=='upi');document.getElementById('bank-fields').classList.toggle('hidden',this.value!=='bank_transfer');});
  document.getElementById('wd-form').addEventListener('submit',async(e)=>{e.preventDefault();const err=document.getElementById('wd-error'),suc=document.getElementById('wd-success');err.classList.add('hidden');suc.classList.add('hidden');
    try{const r=await apiFetch('/api/wallet/withdraw/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({amount:document.getElementById('wd-amount').value,method:document.getElementById('wd-method').value,upi_id:document.getElementById('wd-upi').value,bank_name:document.getElementById('wd-bank').value,account_number:document.getElementById('wd-acc').value,ifsc_code:document.getElementById('wd-ifsc').value,account_holder_name:document.getElementById('wd-holder').value})});const d=await r.json();if(r.ok||r.status===201){suc.textContent='Withdrawal request submitted!';suc.classList.remove('hidden');}else{err.textContent=Object.values(d).flat().join(' ')||'Error.';err.classList.remove('hidden');}}catch(ex){err.textContent='Network error.';err.classList.remove('hidden');}
  });
</script>
{% endblock %}
